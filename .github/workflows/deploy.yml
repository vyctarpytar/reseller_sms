name: Build and Deploy to VM

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'frontend/**'
      - '.github/workflows/react.yml'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Prepare app dir on VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/app
            sudo chown -R $(whoami):$(whoami) /opt/app

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "target/smart_gate_springboot-0.0.1-SNAPSHOT.jar"
          strip_components: 1
          target: "/opt/app/"


      - name: Restart App on VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart sms-app


      - name: Show last 25 lines of app logs on VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo journalctl -u sms-app -n 25 --no-pager
  

  #   sudo nano /etc/systemd/system/sms-app.service
  #   sudo systemctl daemon-reload
  #   sudo systemctl restart sms-app
  #   sudo systemctl status sms-app