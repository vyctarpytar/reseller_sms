# --- Connection pool (Hikari) — sized for a 4-core / 8GB box with Postgres co-located on localhost.
# A SMALL pool is correct here: Postgres serves far better with a handful of active connections per
# core than with 100 (100 backends would thrash the 4 cores and eat RAM that PG/RabbitMQ/JVM share).
# The pool is the hard ceiling on concurrent DB work; the RabbitMQ workers and Tomcat threads below
# are sized to fit under it. Keep DB max_connections (postgresql.conf) >= this + headroom for psql.
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1740000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.leak-detection-threshold=30000

#--------------------JPA-ORM Properties-----------------
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
# Batch inserts/updates so bulk sends do fewer DB round-trips.
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
# NOTE: open-in-view is left at its default (true). Setting it false frees DB connections earlier
