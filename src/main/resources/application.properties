# --- HTTP server thread pool — capped so the admin/API tier can't spawn 200 threads on 4 cores.
# 64 worker threads is ample for the portal + REST API; requests beyond that queue (accept-count).
server.tomcat.threads.max=64
server.tomcat.threads.min-spare=8
server.tomcat.accept-count=100
server.tomcat.max-connections=4000

# --- @Scheduled crons share ONE thread by default, so a slow tick (e.g. the SMS retry batch making
# Airtel calls) blocks every other cron (M-Pesa B2C status, callbacks, low-balance). Give them a pool.
spring.task.scheduling.pool.size=4


