<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/spa_favi.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#69472E" />
  <meta name="description" content="Synq Africa — Value Added Communication Solutions" />
  <link rel="manifest" href="/manifest.json" />
  <!-- Material Icons webfont + the .material-icons base class. Previously injected
       at runtime by the material-icons-react package (now replaced by a local
       shim, src/shims/material-icons-react.jsx). -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <title>Synq Africa SMS</title>

  <!-- JavaScript for dynamic title and favicon based on subdomain -->
  <script>
    const subdomain = window.location.hostname.split('.')[1];

    // Set the title and favicon dynamically based on subdomain
    document.title = getTitleForSubdomain(subdomain);

    function getTitleForSubdomain(subdomain) {
      switch (subdomain) {
        case 'synqafrica':
          return 'Sms - Synq Africa';
        case 'synqtel':
          return 'Sms - Synqtel';
        case 'futuresoft':
          return 'Sms - Future Soft';
        default:
          return 'Sms - Synq Africa';
      }
    }

    const faviconPath = getFaviconPathForSubdomain(subdomain);
    const faviconElement = document.querySelector('link[rel="icon"]');
    if (faviconElement) {
      faviconElement.href = `${window.location.origin}/${faviconPath}`;
    }

    function getFaviconPathForSubdomain(subdomain) {
      switch (subdomain) {
        case 'synqafrica':
          return 'sync_favi.png';
        case 'synqtel':
          return 'synctel-favi.jpeg';
        case 'futuresoft':
          return 'futuresoft-favi.png';
        default:
          return 'sync_favi.png';
      }
    }
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/index.js"></script>
</body>

</html>
