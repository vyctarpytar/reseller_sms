<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Synq Africa — Logo system</title>
<style>
  body{margin:0;font-family:'Helvetica Neue',Arial,sans-serif;color:#334155;background:#fafaf9}
  header{padding:32px 40px;border-bottom:3px solid #D96C3B}
  header h1{margin:0;font-size:22px;color:#69472E}
  header p{margin:4px 0 0;color:#64748b;letter-spacing:2px;font-size:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding:40px}
  .cell{background:#fff;border:1px solid #EEEAE4;border-radius:14px;padding:28px;text-align:center;
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .cell.dark{background:#13161D;border-color:#13161D}
  .cell img{max-width:100%;max-height:120px}
  .cell.mark img{max-height:200px}
  .cell figcaption{font-size:12px;color:#64748b}
  .cell.dark figcaption{color:#cbbfae}
  code{background:#F2EFEA;padding:1px 6px;border-radius:5px;font-size:11px;color:#69472E}
  .cell.dark code{background:#2a2118;color:#e9ddcd}
</style>
</head>
<body>
<header>
  <h1>Synq Africa — Logo system</h1>
  <p>VALUE ADDED MOBILE SOLUTIONS</p>
</header>
<div class="grid">
  <figure class="cell">
    <img src="SA-Logo.png" alt="Standard horizontal logo"/>
    <figcaption><code>SA-Logo.png</code> — primary, light backgrounds</figcaption>
  </figure>
  <figure class="cell dark">
    <img src="SA-Logo-W.png" alt="White horizontal logo"/>
    <figcaption><code>SA-Logo-W.png</code> — reversed, dark backgrounds (#13161D)</figcaption>
  </figure>
  <figure class="cell mark">
    <img src="synq-africa-mark.png" alt="Stacked Africa-spark mark"/>
    <figcaption><code>synq-africa-mark.png</code> — square / stacked (app icon, avatar, watermark)</figcaption>
  </figure>
</div>
</body>
</html>
