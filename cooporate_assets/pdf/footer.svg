<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 90" width="1000" height="90" role="img" aria-label="Synq Africa document footer">
  <!-- PDF footer band. Full page width; sits at the bottom of every page. Brown rule on top,
       registered details + contact line. The page number is drawn by the PDF engine to the
       right of this band (see skill), not baked into the image.
       Source of truth — export to footer.png and mirror into resources/branding/. -->
  <rect x="0" y="0" width="1000" height="90" fill="#ffffff"/>
  <rect x="40" y="14" width="920" height="2.5" rx="1.25" fill="#69472E"/>
  <text x="40" y="44" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12"
        font-weight="600" fill="#69472E">Synq Africa Holdings Limited</text>
  <text x="40" y="64" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11"
        fill="#64748b">Bulk SMS · USSD · M-Pesa Notifications · SynqChat — across 47 African networks</text>
  <text x="960" y="44" text-anchor="end" font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="11.5" fill="#334155">support@synqafrica.co.ke</text>
  <text x="960" y="64" text-anchor="end" font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="11.5" fill="#334155">synqafrica.co.ke</text>
</svg>
